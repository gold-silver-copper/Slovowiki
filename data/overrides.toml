# Manual curation / override file.
#
# Known exceptions the algorithm is not expected to derive from Slavic evidence
# alone — chiefly internationalisms with idiosyncratic Interslavic adaptation.
# Overrides are applied on the production site but are EXCLUDED from
# pure-algorithm accuracy (the benchmark never reads this file) and are reported
# separately. Match is by English meaning (any comma-separated sub-gloss).

[[override]]
meaning = "computer"
official = "kompjuter"
reason = "Official Interslavic dictionary; internationalism with Slavic adaptation (English -er kept, not calqued)."
sources = ["https://interslavic-dictionary.com/"]

[[override]]
meaning = "football"
official = "futbol"
reason = "Phonetic respelling of an English loan (§5.3); not derivable from a Slavic root."
sources = ["https://interslavic.fun/learn/vocabulary/derivation/"]

[[override]]
meaning = "jazz"
official = "džaz"
reason = "Loan [dʒ] written dž, never etymological đ (§5.3)."
sources = ["https://interslavic.fun/learn/phonology/"]
